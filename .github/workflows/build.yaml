name: go-tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: go-tests-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ "1.24" ]
    steps:
      - name: Set up Golang
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: mocks
        run: make generate

      - name: Setup go modules
        run: go clean -modcache;go mod tidy; go mod download; go mod verify;

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v2
        with:
          version: latest
          args: --timeout=5m --modules-download-mode=readonly
          skip-pkg-cache: true
          skip-build-cache: true

      - name: docker-compose
        run: docker compose up -d
      - name: Test and generate code coverage
        run: go test -v --tags=integration_test -coverprofile=coverage.txt -covermode=atomic ./...
      - run: docker compose down

      - name: sonarcloud-scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
  all-tests-passed:
    name: go-tests
    needs: [ build ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build success
        if: ${{ needs.build.result != 'success' }}
        run: exit 1
      - name: Success
        if: ${{ needs.build.result == 'success' }}
        run: exit 0
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Set up Golang
        uses: actions/setup-go@v2
        with:
          go-version: "1.24"
        id: go
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: release
        uses: cycjimmy/semantic-release-action@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 18
          extra_plugins: |
            @semantic-release/git@10.0.1
            @semantic-release/exec@6.0.2
            @semantic-release/changelog@6.0.1
